# =============================================================================
# chatwoot-template/docker-compose.yml  –  Chatwoot instance template
#
# This single file is shared by ALL company instances.
# Company-specific values come from companies/${COMPANY}.env.
#
# Usage:
#   COMPANY=mycompany DOMAIN=mycompany.chat.example.com \
#     docker compose \
#       --project-name chatwoot_mycompany \
#       -f chatwoot-template/docker-compose.yml \
#       up -d
#
# Or, simpler: use scripts/create-company.sh <company> <domain>
#
# Required environment variables (pass on the command line or via shell):
#   COMPANY  – unique company slug (e.g. mycompany); used for container
#              names and Traefik router/service names.
#   DOMAIN   – full public hostname for Chatwoot
#              (e.g. mycompany.chat.example.com).
#
# Prerequisites:
#   • infra/ must be running so that the chatwoot-net network already exists:
#       docker compose -f infra/docker-compose.yml up -d
#   • A company database (chatwoot_${COMPANY}) must exist in Postgres.
#     scripts/create-company.sh creates it automatically.
#   • An Evolution API database (evolution_${COMPANY}) must exist in Postgres.
#     scripts/create-company.sh creates it automatically.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Web — Rails application server
  # ---------------------------------------------------------------------------
  web:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_${COMPANY}_web
    env_file:
      - ../companies/${COMPANY}.env
    environment:
      # FRONTEND_URL derives from the public DOMAIN so it is always consistent
      # with the Traefik routing rule — never hardcode it in the company env.
      FRONTEND_URL: "https://${DOMAIN}"
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    restart: unless-stopped
    volumes:
      - storage:/app/storage
    networks:
      - chatwoot-net
    labels:
      - "traefik.enable=true"

      # ------------------------------------------------------------------
      # HTTP router — redirects plain HTTP → HTTPS (keeps port 80 clear
      # for the ACME HTTP-01 challenge; do NOT use a global redirect).
      # ------------------------------------------------------------------
      - "traefik.http.routers.${COMPANY}-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPANY}-http.entrypoints=web"
      - "traefik.http.routers.${COMPANY}-http.middlewares=redirect-https@docker"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

      # ------------------------------------------------------------------
      # HTTPS router — TLS termination via Let's Encrypt.
      # ------------------------------------------------------------------
      - "traefik.http.routers.${COMPANY}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${COMPANY}.entrypoints=websecure"
      - "traefik.http.routers.${COMPANY}.tls=true"
      - "traefik.http.routers.${COMPANY}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPANY}.loadbalancer.server.port=3000"
      # Sticky sessions — required for Chatwoot WebSockets (ActionCable).
      - "traefik.http.services.${COMPANY}.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.${COMPANY}.loadbalancer.sticky.cookie.name=chatwoot_sticky"
      - "traefik.http.services.${COMPANY}.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.${COMPANY}.loadbalancer.sticky.cookie.httpOnly=true"

  # ---------------------------------------------------------------------------
  # Worker — Sidekiq background job processor
  # ---------------------------------------------------------------------------
  worker:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_${COMPANY}_worker
    env_file:
      - ../companies/${COMPANY}.env
    environment:
      FRONTEND_URL: "https://${DOMAIN}"
    command: bundle exec sidekiq -C config/sidekiq.yml
    restart: unless-stopped
    volumes:
      - storage:/app/storage
    networks:
      - chatwoot-net

  # ---------------------------------------------------------------------------
  # Evolution API — WhatsApp integration bridge (internal only)
  #
  # This container is NOT exposed to the internet — no Traefik labels, no
  # published ports.  All traffic with Chatwoot travels over the shared
  # chatwoot-net Docker bridge using the internal container hostname
  # (chatwoot_${COMPANY}_web:3000).
  #
  # Outbound internet access (to WhatsApp servers) works automatically via
  # the default Docker NAT gateway — no extra configuration is required.
  #
  # SERVER_URL is set to the internal address so Evolution API knows its own
  # base URL when constructing webhook payloads sent to Chatwoot.
  # ---------------------------------------------------------------------------
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: chatwoot_${COMPANY}_evolution
    env_file:
      - ../companies/${COMPANY}.env
    environment:
      # Internal address — Evolution API is not reachable from outside.
      SERVER_URL: "http://chatwoot_${COMPANY}_evolution:8080"
    restart: unless-stopped
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - chatwoot-net

# =============================================================================
# Network — joins the shared network declared by the Traefik compose.
# =============================================================================
networks:
  chatwoot-net:
    external: true
    name: chatwoot-net

# =============================================================================
# Volumes — isolated file storage for this company instance.
# =============================================================================
volumes:
  storage:
  # WhatsApp session data and media cache for Evolution API.
  evolution_instances:
