# =============================================================================
# infrastructure/traefik/traefik.yml  –  Traefik v3 static configuration
#
# ACME e-mail is read from the ACME_EMAIL environment variable.
# Set it in infrastructure/traefik/.env — do NOT hardcode it here.
# =============================================================================

# ---------------------------------------------------------------------------
# API / Dashboard  (disable or protect in production)
# ---------------------------------------------------------------------------
api:
  dashboard: false
  insecure: false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: INFO  # DEBUG | INFO | WARN | ERROR

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------
entryPoints:
  # Plain HTTP – serves the Let's Encrypt HTTP-01 challenge.
  # Do NOT add a global redirect here — it blocks the ACME challenge.
  web:
    address: ":80"

  # HTTPS – all real application traffic lands here.
  websecure:
    address: ":443"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  docker:
    # Only expose containers that carry the "traefik.enable=true" label.
    exposedByDefault: false
    # Route traffic only through the shared chatwoot-net network.
    network: chatwoot-net

# ---------------------------------------------------------------------------
# Certificate resolver (Let's Encrypt via HTTP-01 challenge)
# ---------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      # Set ACME_EMAIL in infrastructure/traefik/.env — do NOT edit here.
      email: ${ACME_EMAIL}
      # Must match the bind-mount path in docker-compose.yml.
      storage: /acme.json
      httpChallenge:
        entryPoint: web
