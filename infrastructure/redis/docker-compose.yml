# =============================================================================
# infrastructure/redis/docker-compose.yml  –  Redis shared instance
#
# Manages:
#   • Redis 7  — shared cache/queue (password-protected, persistence enabled)
#
# Prerequisites:
#   Copy .env.example to .env and set REDIS_PASSWORD.
#
# Usage (from repo root):
#   docker compose -f infrastructure/redis/docker-compose.yml up -d
#
# Start AFTER Traefik (so the chatwoot-net network already exists).
# =============================================================================

services:

  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    networks:
      - chatwoot-net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Network — joins the shared network declared by the Traefik compose.
# =============================================================================
networks:
  chatwoot-net:
    external: true
    name: chatwoot-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
