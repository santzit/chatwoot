# =============================================================================
# infra/docker-compose.yml  –  Shared infrastructure services
# =============================================================================
#
# Manages:
#   • Traefik v3  — reverse proxy, automatic TLS (Let's Encrypt)
#   • PostgreSQL 16  — shared cluster (one database per company)
#   • Redis 7  — shared cache / queue
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in every value.
#   2. Create acme.json with strict permissions:
#        install -m 600 /dev/null infra/acme.json
#
# Usage (from repo root):
#   docker compose -f infra/docker-compose.yml up -d
# =============================================================================

services:

  # ===========================================================================
  # Traefik  –  reverse proxy / TLS termination
  # Discovers company containers automatically via the Docker provider.
  # ===========================================================================
  traefik:
    image: traefik:v3.6
    container_name: chatwoot_traefik
    restart: unless-stopped
    networks:
      - chatwoot-net
    ports:
      - "80:80"
      - "443:443"
    environment:
      # ACME_EMAIL is read from infra/.env — do NOT hardcode it in traefik.yml.
      # ACME_EMAIL: ${ACME_EMAIL}
      ACME_EMAIL: admin@santzit.com
    volumes:
      # Read-only Docker socket — lets Traefik discover labelled containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static configuration (entrypoints, ACME resolver, Docker provider).
      - ./traefik.yml:/traefik.yml:ro
      # Let's Encrypt certificate storage.
      # Must be created with chmod 600 before starting — Traefik enforces this.
      - ./acme.json:/acme.json

  # ===========================================================================
  # PostgreSQL  –  shared cluster, one database per company
  # Company databases are created by scripts/create-company.sh.
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: unless-stopped
    networks:
      - chatwoot-net
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # "postgres" is the internal maintenance database.
      # Company databases (chatwoot_<company>) are provisioned separately.
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis  –  shared instance (password-protected, persistence enabled)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    networks:
      - chatwoot-net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --ignore-warnings OVERCOMMIT_MEMORY
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Network
# Declared here; all company stacks join it as an external network.
# =============================================================================
networks:
  chatwoot-net:
    name: chatwoot-net
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
