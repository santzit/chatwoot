# =============================================================================
# infra/docker-compose.yml  –  Shared infrastructure services
# =============================================================================
#
# Manages:
#   • Traefik  — reverse proxy + automatic TLS (Let's Encrypt)
#   • PostgreSQL 16  — shared cluster (each tenant has its own database)
#   • Redis 7  — shared cache/queue
#
# Usage:
#   1. Copy .env.example to .env and fill in every value.
#   2. touch traefik/acme.json && chmod 600 traefik/acme.json
#   3. docker compose up -d
#
# Start infra BEFORE starting any company instance.
# =============================================================================

services:

  # ===========================================================================
  # Traefik – reverse proxy / TLS termination
  # Discovers company containers automatically via the Docker provider.
  # ===========================================================================
  traefik:
    image: traefik:v3.3
    container_name: chatwoot_traefik
    restart: unless-stopped
    networks:
      - chatwoot-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only Docker socket — lets Traefik discover labelled containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static configuration (entrypoints, ACME resolver, Docker provider).
      - ./traefik/traefik.yml:/traefik.yml:ro
      # Let's Encrypt certificate store — must exist with mode 0600.
      - ./traefik/acme.json:/acme.json

  # ===========================================================================
  # PostgreSQL — shared cluster, one database per tenant
  # Tenant databases are created automatically by `rails db:chatwoot_prepare`
  # the first time each company instance is started.
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: chatwoot_postgres
    restart: unless-stopped
    networks:
      - chatwoot-net
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # "postgres" is the internal maintenance database; tenants use their own.
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Redis — shared instance (password-protected, persistence enabled)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    networks:
      - chatwoot-net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Network
# Declared here with an explicit name so all company compose files can join it
# as an external network.
# =============================================================================
networks:
  chatwoot-net:
    name: chatwoot-net
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
