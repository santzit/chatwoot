# =============================================================================
# traefik/traefik.yml  –  Traefik v3 static configuration
#
# Change the ACME e-mail address below before going to production.
# =============================================================================

# ---------------------------------------------------------------------------
# API / Dashboard  (disable or protect in production)
# ---------------------------------------------------------------------------
api:
  dashboard: false   # Set to true and add a secured router if you need the UI.
  insecure: false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: INFO        # DEBUG | INFO | WARN | ERROR

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------
entryPoints:
  # Plain HTTP – serves the Let's Encrypt HTTP-01 challenge and the
  # per-tenant redirect middleware (defined in each tenant's compose labels).
  # Do NOT add a global redirect here — it would block the ACME challenge.
  web:
    address: ":80"

  # HTTPS – all real application traffic lands here.
  websecure:
    address: ":443"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  docker:
    # Only expose containers that carry the "traefik.enable=true" label.
    exposedByDefault: false
    # Use this network when routing traffic to discovered containers.
    network: chatwoot-net

# ---------------------------------------------------------------------------
# Certificate resolver (Let's Encrypt via HTTP-01 challenge)
# ---------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      # Read from the ACME_EMAIL variable in the root .env file.
      # Set it there — do NOT edit this file.
      email: ${ACME_EMAIL}
      # Must match the path inside the named volume mounted in docker-compose.yml.
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
