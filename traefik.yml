# =============================================================================
# traefik.yml  –  Traefik v3 static configuration (v0.2x)
#
# ACME e-mail is read from the ACME_EMAIL environment variable set in .env.
# Do NOT hardcode e-mail or domain values here.
# =============================================================================

# ---------------------------------------------------------------------------
# API / Dashboard  (disabled in production)
# ---------------------------------------------------------------------------
api:
  dashboard: false
  insecure: false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: INFO  # DEBUG | INFO | WARN | ERROR

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------
entryPoints:
  # Plain HTTP – serves the Let's Encrypt HTTP-01 ACME challenge.
  # Do NOT add a global redirect here — it would block the ACME challenge.
  web:
    address: ":80"

  # HTTPS – all real application traffic.
  websecure:
    address: ":443"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  docker:
    # Only expose containers that carry the "traefik.enable=true" label.
    exposedByDefault: false
    # Route traffic through the shared chatwoot-net network.
    network: chatwoot-net

# ---------------------------------------------------------------------------
# Certificate resolver (Let's Encrypt via HTTP-01 challenge)
# ---------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      # The ACME email is injected via the --certificatesResolvers.letsencrypt.acme.email
      # CLI flag in docker-compose.yml (traefik.yml does NOT expand ${...} variables).
      storage: /acme.json
      httpChallenge:
        entryPoint: web
