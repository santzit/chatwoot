# =============================================================================
# docker-compose.ci.yml  –  CI-only override (v0.2x)
#
# Publishes Chatwoot's port 3000 to the host runner so CI tests can reach
# the application directly at http://localhost:3000 without going through
# Traefik. Traefik is not started in CI.
#
# Usage (CI only — do NOT use in production):
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d chatwoot
# =============================================================================

services:
  chatwoot:
    ports:
      - "3000:3000"
    environment:
      # Override FRONTEND_URL so it matches the URL used in CI tests.
      FRONTEND_URL: "http://localhost:3000"

  chatwoot-worker:
    environment:
      FRONTEND_URL: "http://localhost:3000"
