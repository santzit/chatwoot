# =============================================================================
# docker-compose.yml  –  Chatwoot tenant instance
# =============================================================================
#
# This file is IDENTICAL for every tenant.
# All tenant-specific values come from the .env file in this directory:
#
#   TENANT_SLUG  – unique identifier (e.g. empresa1); used for container names
#                  and Traefik router/service names.
#   DOMAIN       – public hostname (e.g. empresa1.chat.example.com); used in
#                  the Traefik routing rule.
#
# To add a new tenant:
#   cp -r empresa1 empresa4
#   # Edit empresa4/.env: set TENANT_SLUG, DOMAIN, POSTGRES_DATABASE,
#   #   FRONTEND_URL, SECRET_KEY_BASE, and encryption keys.
#   cd empresa4 && docker compose up -d
#   docker compose exec web bundle exec rails db:chatwoot_prepare
#
# Prerequisites:
#   The infra stack (infra/docker-compose.yml) must be running before starting
#   any tenant, so that the chatwoot-net network and the postgres/redis
#   containers already exist.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Web — Rails application server
  # ---------------------------------------------------------------------------
  web:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_${TENANT_SLUG}_web
    restart: unless-stopped
    env_file: .env
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - storage:/app/storage
    networks:
      - chatwoot-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TENANT_SLUG}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${TENANT_SLUG}.entrypoints=websecure"
      - "traefik.http.routers.${TENANT_SLUG}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${TENANT_SLUG}.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Worker — Sidekiq background job processor
  # ---------------------------------------------------------------------------
  worker:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot_${TENANT_SLUG}_worker
    restart: unless-stopped
    env_file: .env
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - storage:/app/storage
    networks:
      - chatwoot-net

# =============================================================================
# Network — joins the shared infra network (must be started first)
# =============================================================================
networks:
  chatwoot-net:
    external: true
    name: chatwoot-net

# =============================================================================
# Volumes — isolated file storage for this tenant
# =============================================================================
volumes:
  storage:
