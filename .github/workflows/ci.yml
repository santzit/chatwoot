# =============================================================================
# .github/workflows/ci.yml  –  Chatwoot stack CI (v0.2x)
#
# Starts a subset of the stack (postgres + redis + rails + evolution-api).
# Traefik and sidekiq are omitted in CI — Traefik requires ports 80/443 not
# available on GitHub runners, and sidekiq running db:chatwoot_prepare
# concurrently with rails causes a UniqueViolation crash loop.
#
# All readiness checks and API tests run INSIDE the chatwoot_rails container
# over the Docker network — no host port bindings or Traefik routing required.
#
# Env files are derived from the *.example files using sed so that CI always
# exercises the same template the operator uses on a real deployment.
#
# Docker images are pulled via "docker compose pull" which uses Docker's own
# layer cache to skip re-downloading unchanged layers.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Generate env files from examples
      #
      # Copy each *.example file and substitute placeholder values with
      # CI-specific values using sed — this exercises the same templates
      # an operator would use on a real deployment.
      # -----------------------------------------------------------------------
      - name: Generate env files
        run: |
          # .env — infrastructure credentials
          cp .env.example .env
          sed -i 's|DOMAIN=.*|DOMAIN=localhost|' .env
          sed -i 's|ACME_EMAIL=.*|ACME_EMAIL=ci@example.org|' .env
          sed -i 's|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=testpass|' .env
          sed -i 's|REDIS_PASSWORD=.*|REDIS_PASSWORD=testredis|' .env
          install -m 600 /dev/null acme.json

          # chatwoot.env — application secrets
          cp chatwoot.env.example chatwoot.env
          skb=$(openssl rand -hex 64)
          arde=$(openssl rand -hex 32)
          arks=$(openssl rand -hex 32)
          arp=$(openssl rand -hex 32)
          sed -i "s/CHANGE_ME_SECRET_KEY_BASE/${skb}/" chatwoot.env
          sed -i "s/CHANGE_ME_DETERMINISTIC_KEY/${arde}/" chatwoot.env
          sed -i "s/CHANGE_ME_DERIVATION_SALT/${arks}/" chatwoot.env
          sed -i "s/CHANGE_ME_PRIMARY_KEY/${arp}/" chatwoot.env
          sed -i 's/CHANGE_ME_SAME_AS_ENV_POSTGRES_USER/chatwoot/' chatwoot.env
          sed -i 's/CHANGE_ME_SAME_AS_ENV_POSTGRES_PASSWORD/testpass/' chatwoot.env
          sed -i 's/CHANGE_ME_SAME_AS_ENV_REDIS_PASSWORD/testredis/' chatwoot.env
          sed -i 's/SMTP_ADDRESS=.*/SMTP_ADDRESS=localhost/' chatwoot.env
          sed -i 's/SMTP_PORT=.*/SMTP_PORT=1025/' chatwoot.env
          chmod 600 chatwoot.env

          # evolution.env — Evolution API config (uses same postgres + redis)
          cp evolution.env.example evolution.env
          sed -i 's|AUTHENTICATION_API_KEY=.*|AUTHENTICATION_API_KEY=ci-evolution-api-key|' evolution.env
          evo_db='postgresql://chatwoot:testpass@postgres:5432/chatwoot_production?schema=evolution_api'
          sed -i "s|DATABASE_CONNECTION_URI=.*|DATABASE_CONNECTION_URI=${evo_db}|" evolution.env
          sed -i 's|CACHE_REDIS_URI=.*|CACHE_REDIS_URI=redis://:testredis@redis:6379/1|' evolution.env
          chmod 600 evolution.env

      # -----------------------------------------------------------------------
      # 2. Pull images
      #
      # Pre-pull all CI service images so Docker's layer cache can skip
      # unchanged layers on subsequent runs.
      # -----------------------------------------------------------------------
      - name: Pull images
        run: docker compose pull postgres redis rails evolution-api

      # -----------------------------------------------------------------------
      # 3. Start stack (CI subset)
      #
      # Traefik is omitted — it requires ports 80/443 not available on GitHub
      # runners.  Sidekiq is omitted — running db:chatwoot_prepare concurrently
      # with rails causes a UniqueViolation crash loop on pg_stat_statements.
      # -----------------------------------------------------------------------
      - name: Start stack
        run: docker compose up -d postgres redis rails evolution-api

      # -----------------------------------------------------------------------
      # 4. Wait for Chatwoot to be ready
      #
      # First waits for the Rails environment + DB (via rails runner), then
      # waits for the Puma web server to accept TCP connections on port 3000 —
      # both are required before the Chatwoot API tests can run.
      # -----------------------------------------------------------------------
      - name: Wait for Chatwoot
        timeout-minutes: 8
        run: |
          until docker exec chatwoot_rails bundle exec rails runner \
              "Account.count" > /dev/null 2>&1; do
            echo "Waiting for Chatwoot (Rails env + DB)..."
            sleep 10
          done
          echo "✔ Chatwoot (Rails env + DB) is ready"
          until docker exec chatwoot_rails ruby -e \
              "require 'socket'; Socket.tcp('localhost', 3000, connect_timeout: 2) { }" \
              2>/dev/null; do
            echo "Waiting for Chatwoot web server (Puma)..."
            sleep 5
          done
          echo "✔ Chatwoot web server is ready"

      # -----------------------------------------------------------------------
      # 5. Bootstrap Chatwoot – create account and verify users
      #
      # Creates a "testco" Chatwoot account, then uses the Platform API to
      # create two users and confirms the responses — proving Rails, Puma,
      # and the database are all fully operational.
      # -----------------------------------------------------------------------
      - name: Bootstrap Chatwoot – create account and users
        run: |
          docker exec -i chatwoot_rails bundle exec rails runner - <<'RUBY'
          require 'net/http'
          require 'json'

          # Create the test account
          account = Account.create!(name: 'testco')
          puts "✔ Account 'testco' created (id=#{account.id})"

          # Create a PlatformApp to obtain a platform API token
          platform_app = PlatformApp.create!(name: 'CI App')
          token = platform_app.access_token.token
          puts "✔ Platform token obtained"

          # Create two users via the Chatwoot Platform API
          [
            { name: 'CI User 1', email: 'ci-user-1@example.org', password: 'Password123!' },
            { name: 'CI User 2', email: 'ci-user-2@example.org', password: 'Password123!' }
          ].each_with_index do |attrs, i|
            uri = URI('http://localhost:3000/platform/api/v1/users')
            req = Net::HTTP::Post.new(uri)
            req['Content-Type']      = 'application/json'
            req['api_access_token']  = token
            req.body = attrs.to_json

            res = Net::HTTP.start(uri.host, uri.port) { |h| h.request(req) }
            unless res.code == '200'
              abort("Failed to create user #{i + 1}: HTTP #{res.code} — #{res.body}")
            end
            user_data = JSON.parse(res.body)
            puts "✔ User #{i + 1} created: #{user_data['email']} (id=#{user_data['id']})"
          end

          puts "✔ All Chatwoot assertions passed"
          RUBY

      # -----------------------------------------------------------------------
      # 6. Wait for Evolution API to be ready
      #
      # TCP check runs inside chatwoot_rails using the Docker network service
      # name "evolution-api" — no host port binding required.
      # -----------------------------------------------------------------------
      - name: Wait for Evolution API
        timeout-minutes: 5
        run: |
          until docker exec chatwoot_rails ruby -e \
              "require 'socket'; Socket.tcp('evolution-api', 8080, connect_timeout: 2) { }" \
              2>/dev/null; do
            echo "Waiting for Evolution API..."
            sleep 5
          done
          echo "✔ Evolution API is ready"

      # -----------------------------------------------------------------------
      # 7. Test Evolution API – create "testco" instance
      #
      # HTTP POST runs inside chatwoot_rails via ruby (stdlib Net::HTTP), calling
      # evolution-api:8080 over the Docker network.
      # Expects HTTP 201 and a JSON body containing "instanceName":"testco".
      # -----------------------------------------------------------------------
      - name: Test Evolution API – create instance
        run: |
          docker exec -i chatwoot_rails ruby - <<'RUBY'
          require 'net/http'
          require 'json'

          uri = URI('http://evolution-api:8080/instance/create')
          req = Net::HTTP::Post.new(uri)
          req['Content-Type'] = 'application/json'
          req['apikey']       = 'ci-evolution-api-key'
          req.body = { instanceName: 'testco',
                       integration:  'WHATSAPP-BAILEYS',
                       qrcode:       false }.to_json

          res = Net::HTTP.start(uri.host, uri.port) { |h| h.request(req) }

          puts "HTTP status : #{res.code}"
          puts "Response body: #{res.body}"

          abort("Expected HTTP 201, got #{res.code} — body: #{res.body}") \
            unless res.code == '201'
          abort('Response missing instanceName:testco') \
            unless res.body.include?('testco')

          puts "✔ Evolution API instance 'testco' created successfully"
          RUBY

      # -----------------------------------------------------------------------
      # Debug: dump container logs on any failure
      # -----------------------------------------------------------------------
      - name: Dump container logs
        if: failure()
        run: |
          echo "=== chatwoot_rails ===" && docker logs chatwoot_rails 2>&1 | tail -80 || true
          echo "=== chatwoot_postgres ===" && docker logs chatwoot_postgres 2>&1 | tail -20 || true
          echo "=== chatwoot_redis ===" && docker logs chatwoot_redis 2>&1 | tail -20 || true
          echo "=== evolution_api ===" && docker logs evolution_api 2>&1 | tail -50 || true

      # -----------------------------------------------------------------------
      # Tear down
      # -----------------------------------------------------------------------
      - name: Tear down
        if: always()
        run: docker compose down -v
