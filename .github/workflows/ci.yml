# =============================================================================
# .github/workflows/ci.yml  –  Chatwoot stack CI (v0.2x)
#
# Starts postgres + redis + rails + evolution-api, waits for both services,
# then runs a smoke test against the Evolution API instance-create endpoint.
#
# All HTTP calls hit http://localhost:3000 / http://localhost:8080 directly
# (no Traefik, no TLS).
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Generate env files
      # -----------------------------------------------------------------------
      - name: Generate env files
        run: |
          printf '%s\n' \
            'DOMAIN=localhost' \
            'ACME_EMAIL=ci@example.org' \
            'POSTGRES_USER=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_PASSWORD=testredis' \
            > .env
          install -m 600 /dev/null acme.json

          printf '%s\n' \
            "SECRET_KEY_BASE=$(openssl rand -hex 64)" \
            "ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=$(openssl rand -hex 32)" \
            "ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=$(openssl rand -hex 32)" \
            "ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=$(openssl rand -hex 32)" \
            'POSTGRES_HOST=postgres' \
            'POSTGRES_PORT=5432' \
            'POSTGRES_DATABASE=chatwoot_production' \
            'POSTGRES_USERNAME=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_URL=redis://:testredis@redis:6379/0' \
            'SMTP_ADDRESS=localhost' \
            'SMTP_PORT=1025' \
            'MAILER_SENDER_EMAIL=ci@localhost' \
            > chatwoot.env
          chmod 600 chatwoot.env

          # Use a fixed key so CI test steps can reference it via the env var below.
          printf '%s\n' \
            'AUTHENTICATION_API_KEY=ci-evolution-api-key' \
            'CHATWOOT_ENABLED=true' \
            'DEL_INSTANCE=false' \
            > evolution.env
          chmod 600 evolution.env

      # -----------------------------------------------------------------------
      # 2. Start postgres + redis + rails + evolution-api
      # -----------------------------------------------------------------------
      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d rails evolution-api

      # -----------------------------------------------------------------------
      # 3. Wait for Chatwoot to be ready
      #
      # Two-phase wait:
      #   a) HTTP: /auth/sign_in returns 200 (proves Rails is up)
      #   b) DB:   rails runner "Account.count" succeeds (proves schema is ready)
      # -----------------------------------------------------------------------
      - name: Wait for Chatwoot
        timeout-minutes: 8
        run: |
          until curl -sf http://localhost:3000/auth/sign_in > /dev/null 2>&1; do
            echo "Waiting for Chatwoot HTTP..."
            sleep 10
          done
          echo "✔ Chatwoot HTTP is ready"

          until docker exec chatwoot_rails bundle exec rails runner "Account.count" > /dev/null 2>&1; do
            echo "Waiting for DB migrations to complete..."
            sleep 15
          done
          echo "✔ Chatwoot DB is ready"

      # -----------------------------------------------------------------------
      # 4. Wait for Evolution API to be ready
      # -----------------------------------------------------------------------
      - name: Wait for Evolution API
        timeout-minutes: 3
        run: |
          until curl -sf http://localhost:8080/ > /dev/null 2>&1; do
            echo "Waiting for Evolution API..."
            sleep 5
          done
          echo "✔ Evolution API is ready"

      # -----------------------------------------------------------------------
      # 5. Test Evolution API – create "testco" instance
      #
      # Uses the fixed API key written to evolution.env above.
      # Expects HTTP 201 and a JSON body containing "instanceName":"testco".
      # -----------------------------------------------------------------------
      - name: Test Evolution API – create instance
        env:
          EVO_API_KEY: ci-evolution-api-key
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST http://localhost:8080/instance/create \
            -H "Content-Type: application/json" \
            -H "apikey: ${EVO_API_KEY}" \
            -d '{
              "instanceName": "testco",
              "integration": "WHATSAPP-BAILEYS",
              "qrcode": false
            }')

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status : ${HTTP_STATUS}"
          echo "Response body: ${BODY}"

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "✘ Expected HTTP 201, got ${HTTP_STATUS}"
            exit 1
          fi

          if ! echo "$BODY" | grep -q '"instanceName".*"testco"'; then
            echo "✘ Response body does not contain instanceName:testco"
            exit 1
          fi

          echo "✔ Evolution API instance 'testco' created successfully"

      # -----------------------------------------------------------------------
      # Tear down
      # -----------------------------------------------------------------------
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

