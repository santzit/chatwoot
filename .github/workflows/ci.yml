# =============================================================================
# .github/workflows/ci.yml  –  Chatwoot stack CI (v0.2x)
#
# Starts the full stack (traefik + postgres + redis + rails + sidekiq +
# evolution-api).  All readiness checks and API tests run INSIDE the
# chatwoot_rails container over the Docker network — no host port bindings
# or Traefik routing required.
#
# Docker images are cached between runs (keyed by docker-compose.yml hash)
# to speed up cold starts.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Generate env files
      # -----------------------------------------------------------------------
      - name: Generate env files
        run: |
          printf '%s\n' \
            'DOMAIN=localhost' \
            'ACME_EMAIL=ci@example.org' \
            'POSTGRES_USER=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_PASSWORD=testredis' \
            > .env
          install -m 600 /dev/null acme.json

          printf '%s\n' \
            "SECRET_KEY_BASE=$(openssl rand -hex 64)" \
            "ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=$(openssl rand -hex 32)" \
            "ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=$(openssl rand -hex 32)" \
            "ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=$(openssl rand -hex 32)" \
            'POSTGRES_HOST=postgres' \
            'POSTGRES_PORT=5432' \
            'POSTGRES_DATABASE=chatwoot_production' \
            'POSTGRES_USERNAME=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_URL=redis://:testredis@redis:6379/0' \
            'SMTP_ADDRESS=localhost' \
            'SMTP_PORT=1025' \
            'MAILER_SENDER_EMAIL=ci@localhost' \
            > chatwoot.env
          chmod 600 chatwoot.env

          # Use a fixed key so CI test steps can reference it in rails runner.
          printf '%s\n' \
            'AUTHENTICATION_API_KEY=ci-evolution-api-key' \
            'CHATWOOT_ENABLED=true' \
            'DEL_INSTANCE=false' \
            > evolution.env
          chmod 600 evolution.env

      # -----------------------------------------------------------------------
      # 2. Docker image cache
      #
      # Cache all pulled images as a tar archive keyed by docker-compose.yml.
      # On a cache hit, "docker load" pre-populates the daemon so "up -d" is
      # near-instant.  On a miss, images are pulled during "up -d", then saved
      # for the next run.  Traefik is omitted from the save to reduce size.
      # -----------------------------------------------------------------------
      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ runner.os }}-${{ hashFiles('docker-compose.yml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images.tar

      # -----------------------------------------------------------------------
      # 3. Start full stack
      # -----------------------------------------------------------------------
      - name: Start stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      # -----------------------------------------------------------------------
      # Save images on first pull (cache miss only)
      #
      # Uses "docker compose config --images" to derive the image list
      # dynamically from docker-compose.yml so this step never drifts out of
      # sync when image versions are bumped.
      # -----------------------------------------------------------------------
      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker compose -f docker-compose.yml config --images \
            | xargs docker save -o /tmp/docker-images.tar

      # -----------------------------------------------------------------------
      # 4. Wait for Chatwoot to be ready
      #
      # All checks run INSIDE the chatwoot_rails container over the Docker
      # network — no host port binding required.
      #
      # Three-phase wait:
      #   a) TCP:  port 3000 accepts connections (container-local localhost)
      #   b) HTTP: /auth/sign_in returns 200 (Rails is serving requests)
      #   c) DB:   rails runner "Account.count" succeeds (schema is applied)
      # -----------------------------------------------------------------------
      - name: Wait for Chatwoot
        timeout-minutes: 8
        run: |
          until docker exec chatwoot_rails nc -z localhost 3000 2>/dev/null; do
            echo "Waiting for Chatwoot TCP..."
            sleep 5
          done
          echo "✔ Chatwoot TCP is ready"

          until docker exec chatwoot_rails wget -qO /dev/null \
              http://localhost:3000/auth/sign_in 2>/dev/null; do
            echo "Waiting for Chatwoot HTTP..."
            sleep 10
          done
          echo "✔ Chatwoot HTTP is ready"

          until docker exec chatwoot_rails bundle exec rails runner \
              "Account.count" > /dev/null 2>&1; do
            echo "Waiting for DB migrations..."
            sleep 15
          done
          echo "✔ Chatwoot DB is ready"

      # -----------------------------------------------------------------------
      # 5. Wait for Evolution API to be ready
      #
      # TCP check runs inside chatwoot_rails using the Docker network service
      # name "evolution-api" — no host port binding required.
      # -----------------------------------------------------------------------
      - name: Wait for Evolution API
        timeout-minutes: 5
        run: |
          until docker exec chatwoot_rails nc -z evolution-api 8080 2>/dev/null; do
            echo "Waiting for Evolution API..."
            sleep 5
          done
          echo "✔ Evolution API is ready"

      # -----------------------------------------------------------------------
      # 6. Test Evolution API – create "testco" instance
      #
      # HTTP POST runs inside chatwoot_rails via ruby (stdlib Net::HTTP), calling
      # evolution-api:8080 over the Docker network.
      # Expects HTTP 201 and a JSON body containing "instanceName":"testco".
      # -----------------------------------------------------------------------
      - name: Test Evolution API – create instance
        run: |
          docker exec -i chatwoot_rails ruby - <<'RUBY'
          require 'net/http'
          require 'json'

          uri = URI('http://evolution-api:8080/instance/create')
          req = Net::HTTP::Post.new(uri)
          req['Content-Type'] = 'application/json'
          req['apikey']       = 'ci-evolution-api-key'
          req.body = { instanceName: 'testco',
                       integration:  'WHATSAPP-BAILEYS',
                       qrcode:       false }.to_json

          res = Net::HTTP.start(uri.host, uri.port) { |h| h.request(req) }

          puts "HTTP status : #{res.code}"
          puts "Response body: #{res.body}"

          abort("Expected HTTP 201, got #{res.code} — body: #{res.body}") \
            unless res.code == '201'
          abort('Response missing instanceName:testco') \
            unless res.body.include?('testco')

          puts "✔ Evolution API instance 'testco' created successfully"
          RUBY

      # -----------------------------------------------------------------------
      # Debug: dump container logs on any failure
      # -----------------------------------------------------------------------
      - name: Dump container logs
        if: failure()
        run: |
          echo "=== chatwoot_rails ===" && docker logs chatwoot_rails 2>&1 | tail -50 || true
          echo "=== evolution_api ===" && docker logs evolution_api 2>&1 | tail -50 || true
          echo "=== chatwoot_traefik ===" && docker logs chatwoot_traefik 2>&1 | tail -20 || true

      # -----------------------------------------------------------------------
      # Tear down
      # -----------------------------------------------------------------------
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
