# =============================================================================
# .github/workflows/ci.yml
#
# Single job: spin up infra, create the testco company, and verify it runs.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  test:
    name: Spin up infra + testco company
    runs-on: ubuntu-latest

    # COMPANY and DOMAIN are exported to every step so Docker Compose can
    # interpolate them in chatwoot-template/docker-compose.yml.
    env:
      COMPANY: testco
      DOMAIN: testco.chat.example.com

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Configure infra
      # -----------------------------------------------------------------------
      - name: Configure infra/.env and acme.json
        run: |
          printf '%s\n' \
            'ACME_EMAIL=ci@example.org' \
            'POSTGRES_USERNAME=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_PASSWORD=testredis' \
            > infra/.env
          install -m 600 /dev/null infra/acme.json

      # -----------------------------------------------------------------------
      # 2. Start shared infrastructure
      # Traefik is skipped to avoid binding ports 80/443 on the CI runner.
      # Starting postgres + redis still creates the chatwoot-net network
      # (declared in infra/docker-compose.yml) so company containers can join it.
      # -----------------------------------------------------------------------
      - name: Start PostgreSQL and Redis
        run: docker compose -f infra/docker-compose.yml up -d postgres redis

      - name: Wait for PostgreSQL to be healthy
        run: |
          timeout 60 bash -c \
            'until docker inspect chatwoot_postgres \
               --format "{{.State.Health.Status}}" 2>/dev/null \
               | grep -q "^healthy$"; \
             do sleep 2; done'
          echo "✔ PostgreSQL healthy"

      # -----------------------------------------------------------------------
      # 3. Create testco company env file
      # -----------------------------------------------------------------------
      - name: Generate companies/testco.env
        run: |
          SECRET=$(openssl rand -hex 64)
          DET=$(openssl rand -hex 32)
          SALT=$(openssl rand -hex 32)
          PRIM=$(openssl rand -hex 32)
          cat > companies/testco.env << EOF
          COMPANY_NAME=testco
          DOMAIN=testco.chat.example.com
          RAILS_ENV=production
          RAILS_LOG_TO_STDOUT=true
          SECRET_KEY_BASE=$SECRET
          ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=$DET
          ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=$SALT
          ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=$PRIM
          POSTGRES_HOST=chatwoot_postgres
          POSTGRES_PORT=5432
          POSTGRES_DATABASE=chatwoot_testco
          POSTGRES_USERNAME=chatwoot
          POSTGRES_PASSWORD=testpass
          REDIS_URL=redis://:testredis@chatwoot_redis:6379/0
          SMTP_ADDRESS=localhost
          SMTP_PORT=587
          SMTP_USERNAME=ci@example.org
          SMTP_PASSWORD=smtppass
          SMTP_AUTHENTICATION=plain
          SMTP_ENABLE_STARTTLS_AUTO=true
          MAILER_SENDER_EMAIL=CI Test <ci@example.org>
          EOF
          echo "✔ companies/testco.env generated"

      - name: Generate companies/testco_evo.env
        run: |
          EVO_KEY=$(openssl rand -hex 32)
          echo "::add-mask::$EVO_KEY"
          echo "EVO_KEY=$EVO_KEY" >> "$GITHUB_ENV"
          cat > companies/testco_evo.env << EOF
          AUTHENTICATION_API_KEY=$EVO_KEY
          DATABASE_ENABLED=true
          DATABASE_PROVIDER=postgresql
          DATABASE_CONNECTION_URI=postgresql://chatwoot:testpass@chatwoot_postgres:5432/evolution_testco
          DATABASE_CONNECTION_CLIENT_NAME=evolution_testco
          DATABASE_SAVE_DATA_INSTANCE=true
          DATABASE_SAVE_DATA_NEW_MESSAGE=true
          DATABASE_SAVE_MESSAGE_UPDATE=true
          DATABASE_SAVE_DATA_CONTACTS=true
          DATABASE_SAVE_DATA_CHATS=true
          DATABASE_SAVE_DATA_LABELS=true
          DATABASE_SAVE_DATA_HISTORIC=true
          CACHE_REDIS_ENABLED=true
          CACHE_REDIS_URI=redis://:testredis@chatwoot_redis:6379/1
          CACHE_REDIS_PREFIX_KEY=evolution_testco
          CACHE_REDIS_SAVE_INSTANCES=false
          CACHE_LOCAL_ENABLED=false
          DEL_INSTANCE=false
          EOF
          echo "✔ companies/testco_evo.env generated"

      # -----------------------------------------------------------------------
      # 4. Provision the company database
      # Run rails db:chatwoot_prepare as a one-off container (same as the real
      # scripts/create-company.sh flow) so the schema exists before the
      # persistent web/worker containers start — preventing the
      # "FATAL: database does not exist" flood this project was built to fix.
      # -----------------------------------------------------------------------
      - name: Create chatwoot_testco database
        run: |
          docker exec chatwoot_postgres \
            psql -U chatwoot -d postgres -c "CREATE DATABASE chatwoot_testco;"
          echo "✔ chatwoot_testco database created"

      - name: Create evolution_testco database
        run: |
          docker exec chatwoot_postgres \
            psql -U chatwoot -d postgres -c "CREATE DATABASE evolution_testco;"
          echo "✔ evolution_testco database created"

      - name: Run rails db:chatwoot_prepare (provision schema)
        timeout-minutes: 10
        run: |
          docker compose \
            --project-name chatwoot_testco \
            -f chatwoot-template/docker-compose.yml \
            run --rm web bundle exec rails db:chatwoot_prepare
          echo "✔ Schema provisioned"

      # -----------------------------------------------------------------------
      # 5. Start testco and verify it stays up
      # -----------------------------------------------------------------------
      - name: Start testco web + worker
        run: |
          docker compose \
            --project-name chatwoot_testco \
            -f chatwoot-template/docker-compose.yml \
            up -d
          echo "✔ testco containers started"

      - name: Verify testco containers are running
        run: |
          sleep 15
          EXITED=$(docker ps -a \
            --filter name=chatwoot_testco \
            --filter status=exited \
            --format "{{.Names}}")
          if [ -n "$EXITED" ]; then
            echo "❌ Container(s) exited unexpectedly: $EXITED"
            docker logs chatwoot_testco_web 2>&1 | tail -30
            exit 1
          fi
          docker ps --filter name=chatwoot_testco
          echo "✔ testco web and worker are running"

      # -----------------------------------------------------------------------
      # 6. Assert no FATAL database errors in postgres log
      # -----------------------------------------------------------------------
      - name: Assert no FATAL database errors in postgres log
        run: |
          if docker compose -f infra/docker-compose.yml logs postgres 2>&1 \
              | grep -qE 'FATAL.*database.*does not exist'; then
            echo "❌ Found FATAL 'database does not exist' in postgres logs:"
            docker compose -f infra/docker-compose.yml logs postgres \
              | grep -E 'FATAL.*database.*does not exist'
            exit 1
          fi
          echo "✔ No FATAL database errors in postgres log"

      # -----------------------------------------------------------------------
      # 7. Assert no FATAL errors in chatwoot web / worker logs
      # -----------------------------------------------------------------------
      - name: Assert no FATAL errors in chatwoot web log
        run: |
          if docker logs chatwoot_testco_web 2>&1 \
              | grep -qE '^F,|FATAL'; then
            echo "❌ Found FATAL error(s) in chatwoot web logs:"
            docker logs chatwoot_testco_web 2>&1 | grep -E '^F,|FATAL'
            exit 1
          fi
          echo "✔ No FATAL errors in chatwoot web log"

      - name: Assert no FATAL errors in chatwoot worker log
        run: |
          if docker logs chatwoot_testco_worker 2>&1 \
              | grep -qE '^F,|FATAL'; then
            echo "❌ Found FATAL error(s) in chatwoot worker logs:"
            docker logs chatwoot_testco_worker 2>&1 | grep -E '^F,|FATAL'
            exit 1
          fi
          echo "✔ No FATAL errors in chatwoot worker log"

      # -----------------------------------------------------------------------
      # 8. Evolution API — wait, HTTP access check, POST /instance/create,
      #    then assert no startup errors in log (log check is last so it
      #    captures the full picture after all functional tests complete).
      # -----------------------------------------------------------------------
      - name: Wait for Evolution API to be ready
        run: |
          EVO_IP=$(docker inspect chatwoot_testco_evolution \
            --format '{{(index .NetworkSettings.Networks "chatwoot-net").IPAddress}}')
          echo "EVO_IP=$EVO_IP" >> "$GITHUB_ENV"
          echo "Waiting for Evolution API at http://${EVO_IP}:8080 …"
          timeout 60 bash -c \
            "until curl -sf http://${EVO_IP}:8080/ > /dev/null 2>&1; do sleep 3; done"
          echo "✔ Evolution API is ready"

      - name: HTTP access check — Evolution API root
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "http://${EVO_IP}:8080/")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Evolution API root returned HTTP $HTTP_STATUS (expected 200)"
            exit 1
          fi
          echo "✔ Evolution API returned HTTP 200"

      - name: POST /instance/create — create CI test WhatsApp instance
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST \
            "http://${EVO_IP}:8080/instance/create" \
            -H "apikey: ${{ env.EVO_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"instanceName":"ci-test","integration":"WHATSAPP-BAILEYS"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ POST /instance/create returned HTTP $HTTP_CODE (expected 201)"
            echo "Response body: $BODY"
            exit 1
          fi
          echo "✔ POST /instance/create succeeded (HTTP 201)"
          echo "Response: $BODY"

      - name: Assert no startup errors in evolution log
        run: |
          if docker logs chatwoot_testco_evolution 2>&1 \
              | grep -qiE '\[ERROR\]|\bERROR\b.*Exception|\bERROR\b.*ECONNREFUSED|\bERROR\b.*Cannot connect'; then
            echo "❌ Found ERROR(s) in evolution logs:"
            docker logs chatwoot_testco_evolution 2>&1 \
              | grep -iE '\[ERROR\]|\bERROR\b.*Exception|\bERROR\b.*ECONNREFUSED|\bERROR\b.*Cannot connect'
            exit 1
          fi
          echo "✔ No startup errors in evolution log"

      # -----------------------------------------------------------------------
      # Tear down
      # -----------------------------------------------------------------------
      - name: Tear down
        if: always()
        run: |
          docker compose \
            --project-name chatwoot_testco \
            -f chatwoot-template/docker-compose.yml \
            down -v 2>/dev/null || true
          docker compose -f infra/docker-compose.yml down -v
