# =============================================================================
# .github/workflows/ci.yml  –  Simplified stack CI (v0.2x)
#
# Spins up the single-domain Chatwoot stack and verifies it works by:
#   1. Generating env files from examples.
#   2. Adding chat.localhost to /etc/hosts so the runner resolves the domain.
#   3. Starting PostgreSQL, Redis, and Traefik.
#   4. Creating the evolution database.
#   5. Starting the Chatwoot web server (runs db:chatwoot_prepare then rails s).
#   6. Starting the Chatwoot worker (Sidekiq, after web is healthy).
#   7. Creating account "testco" with admin user admin@testco.com via Traefik.
#   8. Creating two agents: test1@testco.com and test2@testco.com via Traefik.
#   9. Verifying all users exist via the Chatwoot Agents API through Traefik.
#  10. Checking Chatwoot web and worker logs for FATAL errors.
#
# All HTTP calls go through Traefik on the test hostname (chat.localhost).
# TLS is active (-k / --insecure skips cert validation since ACME cannot
# issue a cert for localhost in CI).
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:

  test:
    name: test
    runs-on: ubuntu-latest

    env:
      # All HTTP traffic goes through Traefik on this hostname.
      # -k / --insecure is required because ACME cannot issue a cert for a
      # .localhost domain in CI; Traefik falls back to its built-in self-signed
      # certificate.
      CHATWOOT_URL: https://chat.localhost

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Generate env files
      # -----------------------------------------------------------------------
      - name: Generate .env
        run: |
          printf '%s\n' \
            'DOMAIN=chat.localhost' \
            'ACME_EMAIL=ci@example.org' \
            'POSTGRES_USERNAME=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_PASSWORD=testredis' \
            > .env
          install -m 600 /dev/null acme.json

      - name: Generate chatwoot.env
        run: |
          SECRET_KEY=$(openssl rand -hex 64)
          ENC_DET=$(openssl rand -hex 32)
          ENC_SALT=$(openssl rand -hex 32)
          ENC_PRIM=$(openssl rand -hex 32)
          printf '%s\n' \
            'RAILS_ENV=production' \
            'RAILS_LOG_TO_STDOUT=true' \
            "SECRET_KEY_BASE=${SECRET_KEY}" \
            "ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${ENC_DET}" \
            "ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${ENC_SALT}" \
            "ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${ENC_PRIM}" \
            'POSTGRES_HOST=postgres' \
            'POSTGRES_PORT=5432' \
            'POSTGRES_DATABASE=chatwoot' \
            'POSTGRES_USERNAME=chatwoot' \
            'POSTGRES_PASSWORD=testpass' \
            'REDIS_URL=redis://:testredis@redis:6379/0' \
            'SMTP_ADDRESS=localhost' \
            'SMTP_PORT=1025' \
            'SMTP_DOMAIN=localhost' \
            'SMTP_USERNAME=' \
            'SMTP_PASSWORD=' \
            'SMTP_AUTHENTICATION=plain' \
            'SMTP_ENABLE_STARTTLS_AUTO=false' \
            'MAILER_SENDER_EMAIL=ci@localhost' \
            > chatwoot.env
          chmod 600 chatwoot.env

      - name: Generate evolution.env
        run: |
          EVO_KEY=$(openssl rand -hex 32)
          echo "::add-mask::$EVO_KEY"
          printf '%s\n' \
            "AUTHENTICATION_API_KEY=${EVO_KEY}" \
            'DATABASE_ENABLED=true' \
            'DATABASE_PROVIDER=postgresql' \
            'DATABASE_CONNECTION_URI=postgresql://chatwoot:testpass@postgres:5432/evolution' \
            'DATABASE_CONNECTION_CLIENT_NAME=evolution' \
            'DATABASE_SAVE_DATA_INSTANCE=true' \
            'DATABASE_SAVE_DATA_NEW_MESSAGE=true' \
            'DATABASE_SAVE_MESSAGE_UPDATE=true' \
            'DATABASE_SAVE_DATA_CONTACTS=true' \
            'DATABASE_SAVE_DATA_CHATS=true' \
            'DATABASE_SAVE_DATA_LABELS=true' \
            'DATABASE_SAVE_DATA_HISTORIC=true' \
            'CACHE_REDIS_ENABLED=true' \
            'CACHE_REDIS_URI=redis://:testredis@redis:6379/1' \
            'CACHE_REDIS_PREFIX_KEY=evolution' \
            'CACHE_REDIS_SAVE_INSTANCES=false' \
            'CACHE_LOCAL_ENABLED=false' \
            'CHATWOOT_ENABLED=true' \
            'DEL_INSTANCE=false' \
            > evolution.env
          chmod 600 evolution.env

      # -----------------------------------------------------------------------
      # 2. Register the test hostname on the runner
      #    All curl calls use CHATWOOT_URL (https://chat.localhost) which
      #    Traefik listens on. Traefik routes the Host header to the chatwoot
      #    container — no direct container IP access anywhere in this workflow.
      # -----------------------------------------------------------------------
      - name: Register chat.localhost in /etc/hosts
        run: echo "127.0.0.1 chat.localhost" | sudo tee -a /etc/hosts

      # -----------------------------------------------------------------------
      # 3. Start PostgreSQL, Redis, and Traefik
      # -----------------------------------------------------------------------
      - name: Start PostgreSQL, Redis, and Traefik
        run: docker compose up -d postgres redis traefik

      - name: Wait for PostgreSQL to be healthy
        run: |
          DEADLINE=$((SECONDS + 60))
          until docker inspect chatwoot_postgres \
                  --format "{{.State.Health.Status}}" 2>/dev/null \
                  | grep -q "^healthy$"; do
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "✖ Timeout: PostgreSQL did not become healthy within 60 seconds"
              docker logs chatwoot_postgres
              exit 1
            fi
            sleep 2
          done
          echo "✔ PostgreSQL healthy"

      - name: Wait for Redis to be healthy
        run: |
          DEADLINE=$((SECONDS + 60))
          until docker inspect chatwoot_redis \
                  --format "{{.State.Health.Status}}" 2>/dev/null \
                  | grep -q "^healthy$"; do
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "✖ Timeout: Redis did not become healthy within 60 seconds"
              docker logs chatwoot_redis
              exit 1
            fi
            sleep 2
          done
          echo "✔ Redis healthy"

      # -----------------------------------------------------------------------
      # 4. Create the evolution database
      # (The chatwoot database is created automatically by POSTGRES_DB in
      #  docker-compose.yml; evolution must be created once manually.)
      # -----------------------------------------------------------------------
      - name: Create evolution database
        run: |
          docker exec chatwoot_postgres \
            psql -U chatwoot -c "CREATE DATABASE evolution;"
          echo "✔ evolution database created"

      # -----------------------------------------------------------------------
      # 5. Start Chatwoot web server and worker
      # The web container runs db:chatwoot_prepare (migrations) then starts
      # the Rails server. The worker starts only after the web server is
      # healthy (TCP probe on port 3000), ensuring migrations complete first.
      # -----------------------------------------------------------------------
      - name: Start Chatwoot web server
        run: docker compose up -d chatwoot

      - name: Wait for Chatwoot to be ready via Traefik
        timeout-minutes: 5
        run: |
          # Poll https://chat.localhost/auth/sign_in through Traefik.
          # -k  skips TLS cert verification (self-signed fallback in CI).
          # -L  follows the HTTP→HTTPS redirect from Traefik's web entrypoint.
          # Exits non-zero (fails the step) if DEADLINE is reached.
          DEADLINE=$((SECONDS + 240))
          echo "Waiting for Chatwoot at ${CHATWOOT_URL} (timeout: 240s) ..."
          until curl -sfkL "${CHATWOOT_URL}/auth/sign_in" > /dev/null 2>&1; do
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "✖ Timeout: Chatwoot did not respond within 240 seconds"
              echo "--- Chatwoot container logs ---"
              docker logs chatwoot
              exit 1
            fi
            echo "  ... still waiting (${SECONDS}s elapsed)"
            sleep 5
          done
          echo "✔ Chatwoot web server is ready"

      - name: Start Chatwoot worker
        run: docker compose up -d chatwoot-worker

      # -----------------------------------------------------------------------
      # 6. Create account "testco" with admin user admin@testco.com
      # -----------------------------------------------------------------------
      - name: Create testco account and admin@testco.com
        run: |
          RESPONSE=$(curl -skL -w '\n%{http_code}' -X POST \
            "${CHATWOOT_URL}/auth/sign_up" \
            -H "Content-Type: application/json" \
            -d '{
              "account_name": "testco",
              "user_full_name": "Test Admin",
              "email": "admin@testco.com",
              "password": "TestPass123!"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Account creation returned HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "$BODY" | \
            python3 -c \
              "import sys, json; d=json.load(sys.stdin); \
               print(d['data']['access_token'])")
          ACCOUNT_ID=$(echo "$BODY" | \
            python3 -c \
              "import sys, json; d=json.load(sys.stdin); \
               print(d['data']['account_id'])")
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "ACCOUNT_ID=$ACCOUNT_ID"     >> "$GITHUB_ENV"
          echo "✔ Account testco created (ID: $ACCOUNT_ID), admin@testco.com is the owner"

      # -----------------------------------------------------------------------
      # 7. Create test1@testco.com and test2@testco.com
      # -----------------------------------------------------------------------
      - name: Create user test1@testco.com
        run: |
          RESPONSE=$(curl -skL -w '\n%{http_code}' -X POST \
            "${CHATWOOT_URL}/api/v1/accounts/${ACCOUNT_ID}/agents" \
            -H "api_access_token: ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User 1","email":"test1@testco.com","role":"agent"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "test1@testco.com creation returned HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          echo "✔ test1@testco.com created"

      - name: Create user test2@testco.com
        run: |
          RESPONSE=$(curl -skL -w '\n%{http_code}' -X POST \
            "${CHATWOOT_URL}/api/v1/accounts/${ACCOUNT_ID}/agents" \
            -H "api_access_token: ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User 2","email":"test2@testco.com","role":"agent"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "test2@testco.com creation returned HTTP $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
          echo "✔ test2@testco.com created"

      # -----------------------------------------------------------------------
      # 8. Verify both agents exist via the Agents API
      # -----------------------------------------------------------------------
      - name: Verify test1@testco.com and test2@testco.com exist
        run: |
          AGENTS=$(curl -sfkL \
            "${CHATWOOT_URL}/api/v1/accounts/${ACCOUNT_ID}/agents" \
            -H "api_access_token: ${ACCESS_TOKEN}")
          for EMAIL in test1@testco.com test2@testco.com; do
            if echo "$AGENTS" | \
                python3 -c \
                  "import sys, json; d=json.load(sys.stdin); \
                   assert any(a['email']=='${EMAIL}' for a in d), \
                   '${EMAIL} not found'" \
                2>/dev/null; then
              echo "✔ ${EMAIL} verified"
            else
              echo "${EMAIL} NOT found in agent list"
              echo "Agents: $AGENTS"
              exit 1
            fi
          done
          echo "✔ All required users verified"

      # -----------------------------------------------------------------------
      # 9. Log sanity check — web server and worker
      # -----------------------------------------------------------------------
      - name: Assert no FATAL errors in Chatwoot web log
        run: |
          if docker logs chatwoot 2>&1 | grep -qE '^F,|FATAL'; then
            echo "Found FATAL error(s) in Chatwoot web logs:"
            docker logs chatwoot 2>&1 | grep -E '^F,|FATAL'
            exit 1
          fi
          echo "✔ No FATAL errors in Chatwoot web log"

      - name: Assert no FATAL errors in Chatwoot worker log
        run: |
          if docker logs chatwoot-worker 2>&1 | grep -qE '^F,|FATAL'; then
            echo "Found FATAL error(s) in Chatwoot worker logs:"
            docker logs chatwoot-worker 2>&1 | grep -E '^F,|FATAL'
            exit 1
          fi
          echo "✔ No FATAL errors in Chatwoot worker log"

      # -----------------------------------------------------------------------
      # Tear down
      # -----------------------------------------------------------------------
      - name: Tear down
        if: always()
        run: docker compose down -v
