# =============================================================================
# Chatwoot Multi-Tenant Self-Hosted Setup
# =============================================================================
#
# Architecture:
#   Internet → Traefik → empresa1.chat.mysubdomain.com → chatwoot_empresa1
#                      → empresa2.chat.mysubdomain.com → chatwoot_empresa2
#                      → empresa3.chat.mysubdomain.com → chatwoot_empresa3
#
# Shared infrastructure:
#   - PostgreSQL 16  (each tenant gets its own database)
#   - Redis 7
#
# Usage:
#   1. Copy .env.example to .env and fill in the shared secrets.
#   2. Copy env/empresa*.env.example to env/empresa*.env and fill in per-instance
#      values (SECRET_KEY_BASE, FRONTEND_URL, SMTP, etc.).
#   3. Set correct permissions on the Traefik certificate file:
#        touch traefik/acme.json && chmod 600 traefik/acme.json
#   4. docker compose up -d
# =============================================================================

# ---------------------------------------------------------------------------
# YAML anchor: base configuration shared by every Chatwoot container.
# Volumes (storage) and labels (Traefik routing) are set per-service below.
# ---------------------------------------------------------------------------
x-chatwoot-base: &chatwoot-base
  image: chatwoot/chatwoot:latest
  restart: unless-stopped
  networks:
    - chatwoot-net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ===========================================================================
  # Traefik – reverse proxy / TLS termination
  # ===========================================================================
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    networks:
      - chatwoot-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only access to Docker socket so Traefik can discover containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Static configuration file (entrypoints, ACME resolver, etc.).
      - ./traefik/traefik.yml:/traefik.yml:ro
      # Let's Encrypt certificate storage – must exist with mode 0600.
      - ./traefik/acme.json:/acme.json

  # ===========================================================================
  # Empresa 1
  # ===========================================================================
  chatwoot_empresa1_web:
    <<: *chatwoot-base
    container_name: chatwoot_empresa1_web
    env_file:
      - ./env/empresa1.env
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - storage_empresa1:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.empresa1.rule=Host(`empresa1.chat.mysubdomain.com`)"
      - "traefik.http.routers.empresa1.entrypoints=websecure"
      - "traefik.http.routers.empresa1.tls.certresolver=letsencrypt"
      - "traefik.http.services.empresa1.loadbalancer.server.port=3000"

  chatwoot_empresa1_worker:
    <<: *chatwoot-base
    container_name: chatwoot_empresa1_worker
    env_file:
      - ./env/empresa1.env
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - storage_empresa1:/app/storage

  # ===========================================================================
  # Empresa 2
  # ===========================================================================
  chatwoot_empresa2_web:
    <<: *chatwoot-base
    container_name: chatwoot_empresa2_web
    env_file:
      - ./env/empresa2.env
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - storage_empresa2:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.empresa2.rule=Host(`empresa2.chat.mysubdomain.com`)"
      - "traefik.http.routers.empresa2.entrypoints=websecure"
      - "traefik.http.routers.empresa2.tls.certresolver=letsencrypt"
      - "traefik.http.services.empresa2.loadbalancer.server.port=3000"

  chatwoot_empresa2_worker:
    <<: *chatwoot-base
    container_name: chatwoot_empresa2_worker
    env_file:
      - ./env/empresa2.env
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - storage_empresa2:/app/storage

  # ===========================================================================
  # Empresa 3
  # ===========================================================================
  chatwoot_empresa3_web:
    <<: *chatwoot-base
    container_name: chatwoot_empresa3_web
    env_file:
      - ./env/empresa3.env
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - storage_empresa3:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.empresa3.rule=Host(`empresa3.chat.mysubdomain.com`)"
      - "traefik.http.routers.empresa3.entrypoints=websecure"
      - "traefik.http.routers.empresa3.tls.certresolver=letsencrypt"
      - "traefik.http.services.empresa3.loadbalancer.server.port=3000"

  chatwoot_empresa3_worker:
    <<: *chatwoot-base
    container_name: chatwoot_empresa3_worker
    env_file:
      - ./env/empresa3.env
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - storage_empresa3:/app/storage

  # ===========================================================================
  # Shared: PostgreSQL
  # One cluster, one database per tenant (chatwoot_empresa1/2/3).
  # The init script runs only on the very first startup (empty data volume).
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: chatwoot_postgres
    restart: unless-stopped
    networks:
      - chatwoot-net
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # This default database is only used internally by PostgreSQL itself.
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the per-tenant databases on first boot.
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Shared: Redis
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    networks:
      - chatwoot-net
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Networks
# =============================================================================
networks:
  chatwoot-net:
    driver: bridge

# =============================================================================
# Volumes
# Storage volumes are isolated per tenant.
# Database and cache volumes are shared.
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  storage_empresa1:
  storage_empresa2:
  storage_empresa3:
