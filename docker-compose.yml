# =============================================================================
# docker-compose.yml  –  Chatwoot production deployment (v0.2x)
#
# Based on the official Chatwoot production template:
#   https://github.com/chatwoot/chatwoot/blob/develop/docker-compose.production.yaml
#
# Services:
#   • traefik   — reverse proxy, automatic TLS (Let's Encrypt)
#   • postgres  — PostgreSQL 16 with pgvector extension
#   • redis     — cache and job queues
#   • rails     — Chatwoot Rails web server (runs DB migrations on start)
#   • sidekiq   — Chatwoot Sidekiq background worker
#
# Prerequisites / first-time setup: see README.md
#
# Usage:
#   docker compose up -d
# =============================================================================

# Shared base for rails and sidekiq — avoids repeating image/env/volumes.
# Uses the x- prefix so Docker Compose ignores it as a standalone service.
x-base: &base
  image: chatwoot/chatwoot:latest
  env_file: chatwoot.env
  networks:
    - chatwoot-net
  volumes:
    - storage_data:/app/storage

services:

  # ---------------------------------------------------------------------------
  # Traefik  –  reverse proxy / TLS termination
  #
  # ACME_EMAIL is injected via CLI flag — traefik.yml does NOT expand ${...}
  # variables, so the email must come from the docker-compose command: section.
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: chatwoot_traefik
    restart: unless-stopped
    networks:
      - chatwoot-net
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--configFile=/traefik.yml"
      - "--certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      # Must be created with: touch acme.json && chmod 600 acme.json
      - ./acme.json:/acme.json

  # ---------------------------------------------------------------------------
  # PostgreSQL  –  database with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: always
    networks:
      - chatwoot-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot_production
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis  –  cache and job queues (password-protected)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: chatwoot_redis
    restart: always
    networks:
      - chatwoot-net
    env_file: .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Rails  –  Chatwoot web server
  #
  # The official entrypoint (docker/entrypoints/rails.sh) automatically runs
  # db:chatwoot_prepare (migrations) before starting the Rails server.
  # The healthcheck signals readiness so sidekiq waits for migrations.
  # ---------------------------------------------------------------------------
  rails:
    <<: *base
    container_name: chatwoot_rails
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://app.${DOMAIN}
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    healthcheck:
      # nc (netcat) — works in Alpine images that have no bash.
      # start_period is generous because migrations take 3-5 min on first boot.
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 300s
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.rails-http.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.rails-http.entrypoints=web"
      - "traefik.http.routers.rails-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS with Let's Encrypt TLS
      - "traefik.http.routers.rails.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.rails.entrypoints=websecure"
      - "traefik.http.routers.rails.tls=true"
      - "traefik.http.routers.rails.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rails.service=rails"
      - "traefik.http.services.rails.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Sidekiq  –  Chatwoot background job processor
  #
  # Starts only after rails is healthy (migrations complete).
  # ---------------------------------------------------------------------------
  sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq
    restart: always
    depends_on:
      rails:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - FRONTEND_URL=https://app.${DOMAIN}
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

# =============================================================================
# Network
# =============================================================================
networks:
  chatwoot-net:
    name: chatwoot-net
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  storage_data:
  postgres_data:
  redis_data:
